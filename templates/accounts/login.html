{% extends "base.html" %}
{% load static %}
{% block title %}Login — Medburg CRM{% endblock %}

{% block unauthenticated_content %}
<div class="login-layout">
    <div class="login-card">
        <div class="text-center">
            <img src="{% static 'img/logo-icon.png' %}" alt="Medburg" class="login-logo">
            <h4>Medburg CRM</h4>
            <p class="subtitle">Sign in to your account</p>
        </div>

        <form method="post" class="crm-form" novalidate>
            {% csrf_token %}

            {% if form.errors %}
            <div class="crm-alert error">
                <i class="bi bi-exclamation-circle me-1"></i>
                Invalid username or password.
            </div>
            {% endif %}

            <div class="mb-3">
                <label for="id_username" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text" style="border-color: var(--border-color); background: var(--body-bg);">
                        <i class="bi bi-person" style="color: var(--text-muted);"></i>
                    </span>
                    <input type="text" name="username" id="id_username"
                           class="form-control" placeholder="Enter username"
                           autofocus required>
                </div>
            </div>

            <div class="mb-4">
                <label for="id_password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text" style="border-color: var(--border-color); background: var(--body-bg);">
                        <i class="bi bi-lock" style="color: var(--text-muted);"></i>
                    </span>
                    <input type="password" name="password" id="id_password"
                           class="form-control" placeholder="Enter password"
                           required>
                </div>
            </div>

            <button type="submit" class="btn-submit">
                <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
            </button>
        </form>
    </div>
</div>
{% endblock %}
